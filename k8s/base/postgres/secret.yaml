apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: keda-observation
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: wikipedia
  DATABASE_URL: "postgres://postgres:postgres@postgres.keda-observation.svc.cluster.local:5432/wikipedia?sslmode=disable"
