apiVersion: v1
kind: Service
metadata:
  name: consumer
  namespace: keda-observation
  labels:
    app: consumer
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: consumer
  ports:
    - name: metrics
      port: 9090
      targetPort: 9090
